[Application]
app.classpath=$APPDIR/Simjot-0.2.0.jar
app.mainclass=main.ui.app.JournalApp

[JavaOptions]
java-options=-Djpackage.app-version=0.2.0
java-options=-Xmx1G
java-options=--enable-preview
java-options=--enable-native-access=ALL-UNNAMED
java-options=-Dsimjot.spell.path=$APPDIR/simple-english-dictionary/data
java-options=-Dsimjot.dict.path=$APPDIR/simple-english-dictionary/data
